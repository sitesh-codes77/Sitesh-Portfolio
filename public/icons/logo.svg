<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Codeveda Logo -->
  <defs>
    <linearGradient id="codevedaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#codevedaGradient)" opacity="0.1"/>
  
  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#codevedaGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Main "C" Shape -->
  <path d="M 60 60 Q 50 100 60 140 Q 80 160 110 155 L 110 135 Q 85 138 75 120 Q 70 110 70 100 Q 70 90 75 80 Q 85 62 110 65 L 110 45 Q 80 40 60 60 Z" 
        fill="none" stroke="url(#innerGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Inner accent circle with dot -->
  <circle cx="100" cy="100" r="15" fill="url(#codevedaGradient)" opacity="0.6"/>
  <circle cx="100" cy="100" r="8" fill="url(#innerGradient)"/>
  
  <!-- Decorative elements -->
  <g stroke="url(#codevedaGradient)" stroke-width="2" opacity="0.5">
    <line x1="120" y1="70" x2="140" y2="50"/>
    <line x1="130" y1="130" x2="150" y2="150"/>
  </g>
</svg>
